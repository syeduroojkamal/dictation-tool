<!DOCTYPE html>
<html>

<head>
    <title>Dictation Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h2>Handwritten Assignment Dictation</h2>

    <textarea id="text" placeholder="Paste your assignment text here"></textarea>
    <br><br>

    <button onclick="start()">Start Dictation</button>
    <button onclick="next()">Next Sentence</button>
    <button onclick="repeat()">Repeat</button>

    <div id="current"></div>

    <script src="script.js"></script>

</body>

</html>
